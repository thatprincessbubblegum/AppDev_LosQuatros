<!DOCTYPE html>
<head>
    <title>Aerostar Travel & Tours</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
      body {
        background: #f8f8f8;
      }

      .section-card {
        background: #fff;
        border: 1px solid #ccc;
        padding: 24px;
        height: 100%;
      }

      .placeholder-img {
        background: #ddd;
        width: 100%;
        aspect-ratio: 4/3;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #999;
        font-size: 13px;
        border: 1px solid #ccc;
        position: relative;
        overflow: hidden;
      }

      /* X placeholder lines */
      .placeholder-img::before,
      .placeholder-img::after {
        content: '';
        position: absolute;
        width: 141%;
        height: 1px;
        background: #bbb;
        top: 50%;
        left: -20%;
      }
      .placeholder-img::before { transform: rotate(atan2(3,4)); }
      .placeholder-img::after  { transform: rotate(-atan2(3,4)); }

      .booking-summary-body {
        min-height: 120px;
        border-bottom: 1px solid #ccc;
        margin-bottom: 12px;
      }

      label.fw-bold {
        font-size: 13px;
      }

      .add-guest-btn {
        background: #e0e0e0;
        border: none;
        width: 100%;
        padding: 14px;
        font-weight: bold;
        font-size: 14px;
        text-align: center;
        cursor: pointer;
      }

      .add-guest-btn:hover {
        background: #cfcfcf;
      }

      .proceed-btn {
        background: #222;
        color: #fff;
        border: none;
        width: 100%;
        padding: 12px;
        font-weight: bold;
        font-size: 14px;
        letter-spacing: 0.5px;
      }

      .proceed-btn:hover {
        background: #000;
      }

      .addon-price {
        width: 90px;
        text-align: center;
        font-size: 14px;
        border: 1px solid #ccc;
        padding: 4px 8px;
        background: #fff;
      }

      .summary-meta {
        font-size: 14px;
        line-height: 1.8;
      }

      hr.thin {
        border-color: #aaa;
        margin: 16px 0;
      }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg bg-light border-bottom">
  <div class="container">
    <a class="navbar-brand" href="#">Logo</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="destinations&packages.html">Destinations & Packages</a></li>
        <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        <li class="nav-item ms-3">
          <a class="btn btn-dark" href="book.html">Book</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- PAGE TITLE -->
<div class="container my-4 text-center">
  <h1 class="fw-bold" style="font-size: 2.4rem; letter-spacing: 1px;">BOOK YOUR ADVENTURE</h1>
</div>

<!-- MAIN LAYOUT -->
<div class="container mb-5">
  <div class="row g-0 border" style="border-color: #ccc !important;">

    <!-- LEFT COLUMN: BOOKING DETAILS -->
    <div class="col-md-3 border-end section-card">
      <h5 class="fw-bold mb-3">BOOKING DETAILS</h5>

      <!-- PACKAGE -->
      <label class="fw-bold mb-1">PACKAGE</label>
      <input type="text" class="form-control form-control-sm mb-3" placeholder="">

      <!-- GUESTS -->
      <label class="fw-bold mb-1">GUESTS</label>
      <input type="number" class="form-control form-control-sm mb-3" placeholder="" min="1">

      <!-- DATE -->
      <div class="mb-3">
        <label class="me-2 fw-bold">Select Date:</label>
        <input type="date" class="form-control form-control-sm mt-1">
      </div>

      <!-- PACKAGE IMAGE -->
      <div class="placeholder-img mb-3"></div>

      <!-- ACCOMMODATION -->
      <label class="fw-bold mb-2 d-block">ACCOMODATION</label>
      <div class="form-check mb-1">
        <input class="form-check-input" type="checkbox" id="hotel">
        <label class="form-check-label" for="hotel">Hotel</label>
      </div>
      <div class="form-check mb-1">
        <input class="form-check-input" type="checkbox" id="hostel">
        <label class="form-check-label" for="hostel">Hostel</label>
      </div>
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="lorem">
        <label class="form-check-label" for="lorem">Lorem Ipsum</label>
      </div>

      <hr class="thin">

      <!-- BOOKING META -->
      <div class="summary-meta">
        <strong>SELECTED DATE:</strong> 07-17-24<br>
        <strong>DURATION:</strong> 3 Days<br>
        <strong>GUESTS:</strong> 2 Adults
      </div>
    </div>

    <!-- MIDDLE COLUMN: IMAGE + BOOKING SUMMARY -->
    <div class="col-md-3 border-end d-flex flex-column p-0">

      <!-- PACKAGE IMAGE -->
      <div class="placeholder-img" style="aspect-ratio: 1/1; flex-shrink: 0;"></div>

      <!-- BOOKING SUMMARY -->
      <div class="section-card flex-grow-1 d-flex flex-column border-top">
        <h5 class="fw-bold mb-3">BOOKING SUMMARY</h5>

        <!-- Summary Items -->
        <div class="booking-summary-body flex-grow-1">
        </div>

        <!-- Total -->
        <div class="mb-3">
          <strong>TOTAL</strong>
        </div>

        <!-- Proceed Button -->
        <button class="proceed-btn">[ PROCEED TO PAYMENT ]</button>
      </div>
    </div>

    <!-- RIGHT COLUMN: PASSENGER DETAILS -->
    <div class="col-md-6 section-card">
      <h5 class="fw-bold">PASSENGER DETAILS:</h5>
      <p class="fw-bold text-muted mb-3" style="font-size: 14px;">[GUEST 1 - PRIMARY]</p>

      <!-- NAME -->
      <div class="row g-2 mb-2">
        <div class="col-6">
          <input type="text" class="form-control form-control-sm" placeholder="First Name">
        </div>
        <div class="col-6">
          <input type="text" class="form-control form-control-sm" placeholder="Last Name">
        </div>
      </div>

      <!-- DATE OF BIRTH + NATIONALITY -->
      <div class="row g-2 mb-2">
        <div class="col-6">
          <input type="date" class="form-control form-control-sm" placeholder="Date of Birth">
        </div>
        <div class="col-6">
          <select class="form-select form-select-sm">
            <option value="">Nationality</option>
            <option>Filipino</option>
            <option>American</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <!-- EMAIL + PHONE -->
      <div class="row g-2 mb-2">
        <div class="col-6">
          <input type="email" class="form-control form-control-sm" placeholder="Email">
        </div>
        <div class="col-6">
          <input type="tel" class="form-control form-control-sm" placeholder="Phone Number">
        </div>
      </div>

      <!-- PASSPORT -->
      <div class="row g-2 mb-3">
        <div class="col-6">
          <input type="text" class="form-control form-control-sm" placeholder="Passport Number">
        </div>
        <div class="col-6">
          <input type="date" class="form-control form-control-sm" placeholder="Passport Expiry">
        </div>
      </div>

      <!-- OPTIONAL ADD-ONS -->
      <label class="fw-bold mb-2 d-block">OPTIONAL ADD-ONS</label>

      <div class="d-flex align-items-center mb-2 gap-2">
        <input class="form-check-input m-0" type="checkbox" id="transfer">
        <label class="form-check-label flex-grow-1 ms-1" for="transfer">Airport transfer</label>
        <span class="addon-price">₱500</span>
      </div>

      <div class="d-flex align-items-center mb-2 gap-2">
        <input class="form-check-input m-0" type="checkbox" id="insurance">
        <label class="form-check-label flex-grow-1 ms-1" for="insurance">Travel Insurance</label>
        <span class="addon-price">₱750</span>
      </div>

      <div class="d-flex align-items-center mb-4 gap-2">
        <input class="form-check-input m-0" type="checkbox" id="upgrade">
        <label class="form-check-label flex-grow-1 ms-1" for="upgrade">Room Upgrade</label>
        <span class="addon-price">₱2,500</span>
      </div>

      <!-- ADD GUEST -->
      <button class="add-guest-btn mb-3">ADD GUEST 2 DETAILS (2 Adults Selected)</button>

      <!-- BOOKING FAQS -->
      <div class="text-center">
        <a href="#" class="text-muted" style="font-size: 14px;">Booking FAQs</a>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
